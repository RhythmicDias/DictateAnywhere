name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Run tests ────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install sounddevice numpy webrtcvad keyring pyperclip
          pip install -e . --no-deps

      - name: Run tests (no Windows-only deps required)
        run: pytest tests/ -v --tb=short -k "not test_azure and not test_keyring"

  # ── Build .exe ───────────────────────────────────────────────────────────────
  build:
    name: Build Windows executable
    runs-on: windows-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller `
            --name "DictateAnywhere" `
            --windowed `
            --onedir `
            --add-data "assets;assets" `
            --hidden-import "faster_whisper" `
            --hidden-import "azure.cognitiveservices.speech" `
            --hidden-import "keyring.backends.Windows" `
            --hidden-import "sounddevice" `
            --hidden-import "webrtcvad" `
            --hidden-import "pystray._win32" `
            --collect-all "faster_whisper" `
            --collect-all "ctranslate2" `
            --noconfirm `
            src/dictateanywhere/main.py

      - name: Zip the output
        run: |
          Compress-Archive -Path dist/DictateAnywhere/* `
            -DestinationPath dist/DictateAnywhere-${{ github.ref_name }}-windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DictateAnywhere-windows
          path: dist/DictateAnywhere-${{ github.ref_name }}-windows.zip

  # ── Publish GitHub Release ───────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: DictateAnywhere-windows
          path: dist/

      - name: Extract changelog entry for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/## \[$VERSION\]/{flag=1; next} /## \[/{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: DictateAnywhere ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            dist/*.zip
